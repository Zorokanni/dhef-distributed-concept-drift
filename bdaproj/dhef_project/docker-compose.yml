# ============================================================================
# D-HEF Project: Docker Compose Configuration
# Sets up Apache Kafka and Zookeeper for streaming data pipeline
# ============================================================================

version: '3.8'

services:
  # --------------------------------------------------------------------------
  # Zookeeper: Required by Kafka for cluster coordination
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: dhef-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # --------------------------------------------------------------------------
  # Kafka Broker: Message broker for streaming transactions
  # --------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: dhef-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
